<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>God Stickman Fighting</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { position: relative; width: 100%; max-width: 960px; aspect-ratio: 16/9; background: #141419; }
        canvas { width: 100%; height: 100%; display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.8); z-index: 10; }
        .menu-box { text-align: center; padding: 20px; border: 2px solid #ffeb3b; background: #1a1a1a; }
        input { padding: 10px; width: 200px; border: 1px solid #555; background: #000; color: #fff; }
        button { padding: 10px 20px; background: #ffeb3b; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div class="menu-box">
            <h1>GOD STICKMAN</h1>
            <button onclick="startGame()">CHƠI NGAY</button>
            <div style="margin-top: 15px;">
                <input type="text" id="adminCode" placeholder="Mã Admin...">
                <button onclick="checkAdmin()">Kích hoạt</button>
            </div>
            <div id="msg" style="margin-top: 10px;"></div>
        </div>
    </div>
    <canvas id="gameCanvas" width="960" height="540"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Admin Variables
    let godMode = false;

    function checkAdmin() {
        const code = document.getElementById('adminCode').value.trim().toLowerCase();
        const msg = document.getElementById('msg');
        if(code === 'anhdzvcl_god') { godMode = true; msg.innerText = "⭐ Đã bật Bất Tử!"; msg.style.color = "#0f0"; }
        else if(code === 'anhdzvcl_money') { msg.innerText = "💰 Đã nhận 999 VD!"; msg.style.color = "#0f0"; }
        else { msg.innerText = "❌ Mã sai!"; msg.style.color = "#f00"; }
    }

    function startGame() {
        document.getElementById('ui-layer').style.display = 'none';
        requestAnimationFrame(gameLoop);
    }

    function gameLoop() {
        // Clear screen
        ctx.fillStyle = "#141419";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Vẽ nhân vật
        ctx.fillStyle = godMode ? "#ffeb3b" : "#fff";
        ctx.fillRect(100, 350, 50, 100); // P1
        ctx.fillStyle = "#ff1744";
        ctx.fillRect(800, 350, 50, 100); // Boss
        
        requestAnimationFrame(gameLoop);
    }
</script>
</body>
</html>
