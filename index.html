<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>God Stickman</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { width: 960px; height: 540px; background: #1a1a1a; position: relative; }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="960" height="540"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function drawStickman(x, y, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 5;
        // Đầu
        ctx.beginPath();
        ctx.arc(x, y, 20, 0, Math.PI * 2);
        ctx.stroke();
        // Thân
        ctx.beginPath();
        ctx.moveTo(x, y + 20);
        ctx.lineTo(x, y + 80);
        ctx.stroke();
        // Tay
        ctx.moveTo(x, y + 40); ctx.lineTo(x - 30, y + 70);
        ctx.moveTo(x, y + 40); ctx.lineTo(x + 30, y + 70);
        ctx.stroke();
        // Chân
        ctx.moveTo(x, y + 80); ctx.lineTo(x - 30, y + 130);
        ctx.moveTo(x, y + 80); ctx.lineTo(x + 30, y + 130);
        ctx.stroke();
    }

    // Vẽ ngay lập tức sau khi load
    function render() {
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        drawStickman(200, 200, "#fff"); // Người que P1
        drawStickman(700, 200, "#f00"); // Boss
    }
    
    render();
</script>
</body>
</html>
