<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>God Stickman</title>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; }
        canvas { border: 2px solid #555; background: #111; }
        #ui { position: absolute; top: 10px; left: 10px; }
    </style>
</head>
<body>
    <div id="ui">
        <input type="text" id="code" placeholder="Mã Admin...">
        <button onclick="check()">Kích hoạt</button>
        <p id="msg"></p>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Vẽ thử nhân vật để kiểm tra
        ctx.fillStyle = "white";
        ctx.fillRect(50, 200, 40, 80);

        function check() {
            const code = document.getElementById('code').value;
            if (code === 'anhdzvcl_god') {
                document.getElementById('msg').innerText = "Đã bật Bất Tử!";
            } else {
                document.getElementById('msg').innerText = "Sai mã!";
            }
        }
    </script>
</body>
</html>
